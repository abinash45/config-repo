server.port=8081

# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/zeptoorderservice
spring.datasource.username=root
spring.datasource.password=@root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================= EUREKA =================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ================= KAFKA PRODUCER =================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# IMPORTANT: enables headers for tracing in Kafka
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ================= TRACING (COMPLETE FIX) =================
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# propagate trace context correctly across services
management.tracing.propagation.type=w3c

# expose actuator
management.endpoints.web.exposure.include=*

# logs with traceId/spanId
logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]
