server.port=8082

# ================= KAFKA =================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest

# We keep JSON deserializer (OK for now)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# TRUST PACKAGES (important for JSON mapping)
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# IMPORTANT (you are forcing mapping to OrderEvent)
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=zepto.payment.consumer.OrderEvent


# ================= OBSERVABILITY / OBSERVATION =================
spring.kafka.listener.observation-enabled=true
spring.kafka.template.observation-enabled=true


# ================= TRACING (ZIPKIN + W3C) =================
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c

management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans


# ================= ACTUATOR =================
management.endpoints.web.exposure.include=*


# ================= LOGGING (FIXED - NO DUPLICATE, CORRECT FORMAT) =================
logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]
